services:
  hydra-migrate:
    image: iris-hydra:latest
    build:
      context: .
      dockerfile: .docker/Dockerfile-iris-hydra
    environment:
      - DSN=postgres://hydra:secret@postgresd:5432/hydra?sslmode=disable&max_conns=20&max_idle_conns=4
  hydra:
    image: iris-hydra:latest
    container_name: iris-hydra
    build:
      context: .
      dockerfile: .docker/Dockerfile-iris-hydra
    environment:
      - DSN=postgres://hydra:secret@postgresd:5432/hydra?sslmode=disable&max_conns=20&max_idle_conns=4
  hydra-m2m:
    image: iris-hydra:latest
    container_name: iris-hydra-m2m
    build:
      context: .
      dockerfile: .docker/Dockerfile-iris-hydra
    environment:
      - DSN=postgres://hydra:secret@postgresd:5432/hydra?sslmode=disable&max_conns=20&max_idle_conns=4
      - NETWORK_STRATEGY=static
      - NETWORK_ID=cafecafe-cafe-4000-8000-cafecafe0001
    ports:
      - "6664:4444" # Public port
      - "6665:4445" # Admin port
    command: serve -c /etc/config/hydra/hydra.yml all --dev
    volumes:
      - type: bind
        source: ./contrib/quickstart/5-min
        target: /etc/config/hydra
    pull_policy: missing
    restart: unless-stopped
    depends_on:
      - hydra
    networks:
      - intranet
  postgresd:
    image: postgres:16
    container_name: iris-hydra-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=hydra
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=hydra
    networks:
      - intranet
